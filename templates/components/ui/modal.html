{% macro default(id, title, size='') %}
<!-- Modal: {{ id }} -->
<div class="modal fade" id="{{ id }}" tabindex="-1" aria-labelledby="{{ id }}Label" aria-hidden="true">
    <div class="modal-dialog {{ size }} modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title fw-bold" id="{{ id }}Label">{{ title }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                {{ caller() }}
            </div>
        </div>
    </div>
</div>
{% endmacro %}

{% macro confirm(id, title, message, confirm_text='Confirm', confirm_class='btn-danger', confirm_id=None) %}
<!-- Confirm Modal: {{ id }} -->
<div class="modal fade" id="{{ id }}" tabindex="-1" aria-labelledby="{{ id }}Label" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 text-center p-3">
            <div class="modal-body">
                <i class="bi bi-exclamation-circle text-warning mb-3" style="font-size: 3rem;"></i>
                <h5 class="modal-title fw-bold mb-2" id="{{ id }}Label">{{ title }}</h5>
                <p class="text-muted small mb-4">{{ message }}</p>
                
                <div class="d-flex justify-content-center gap-2">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn {{ confirm_class }}" {% if confirm_id %}id="{{ confirm_id }}"{% endif %}>{{ confirm_text }}</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endmacro %}
