{% macro render(items) %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-4">
        {% for item in items %}
            {% if loop.last %}
                <li class="breadcrumb-item active" aria-current="page">{{ item.label }}</li>
            {% else %}
                <li class="breadcrumb-item"><a href="{{ item.url }}" class="text-decoration-none">{{ item.label }}</a></li>
            {% endif %}
        {% endfor %}
    </ol>
</nav>
{% endmacro %}
