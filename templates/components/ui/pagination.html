{% macro render(pagination, endpoint) %}
{% if pagination.total_pages > 1 %}
<nav aria-label="Page navigation">
    <ul class="pagination justify-content-center mt-4 mb-0">
        <!-- Previous -->
        <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
            <a class="page-link border-0 shadow-sm rounded me-2" href="{% if pagination.has_prev %}{{ url_for(endpoint, page=pagination.page - 1) }}{% else %}#{% endif %}" aria-label="Previous">
                <i class="bi bi-chevron-left"></i>
            </a>
        </li>
        
        <!-- Page Numbers -->
        {% for p in range(1, pagination.total_pages + 1) %}
            {% if p == pagination.page %}
                <li class="page-item active"><span class="page-link border-0 shadow-sm rounded mx-1">{{ p }}</span></li>
            {% else %}
                <li class="page-item"><a class="page-link border-0 shadow-sm rounded mx-1" href="{{ url_for(endpoint, page=p) }}">{{ p }}</a></li>
            {% endif %}
        {% endfor %}
        
        <!-- Next -->
        <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
            <a class="page-link border-0 shadow-sm rounded ms-2" href="{% if pagination.has_next %}{{ url_for(endpoint, page=pagination.page + 1) }}{% else %}#{% endif %}" aria-label="Next">
                <i class="bi bi-chevron-right"></i>
            </a>
        </li>
    </ul>
</nav>
{% endif %}
{% endmacro %}
