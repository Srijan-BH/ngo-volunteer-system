{% extends "base.html" %}

{% block title %}My Requests — NGO Volunteer System{% endblock %}

{% block page_title %}My Requests{% endblock %}

{% block content %}
<div class="container-fluid py-2 animate-fade-in-up">
    <!-- Filters / Tabs -->
    <div class="card bg-tertiary border-0 shadow-sm mb-4">
        <div class="card-body p-3">
            <ul class="nav nav-pills nav-fill" id="requestsTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active rounded-pill fw-medium" id="tab-all" data-status="" data-bs-toggle="pill" type="button" role="tab">All Requests</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill fw-medium" id="tab-pending" data-status="pending" data-bs-toggle="pill" type="button" role="tab">Pending</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill fw-medium" id="tab-rejected" data-status="rejected" data-bs-toggle="pill" type="button" role="tab">Rejected</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill fw-medium" id="tab-withdrawn" data-status="withdrawn" data-bs-toggle="pill" type="button" role="tab">Withdrawn</button>
                </li>
            </ul>
        </div>
    </div>

    <!-- Requests List -->
    <div class="row" id="requestsContainer">
        <!-- Skeleton Loaders -->
        <div class="col-12 mb-3">
            <div class="card bg-tertiary border-0 shadow-sm p-4 skeleton">
                <div class="skeleton-text skeleton-title mb-2"></div>
                <div class="skeleton-text"></div>
            </div>
        </div>
        <div class="col-12 mb-3">
            <div class="card bg-tertiary border-0 shadow-sm p-4 skeleton">
                <div class="skeleton-text skeleton-title mb-2"></div>
                <div class="skeleton-text"></div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center mt-4">
        <div class="text-muted" id="paginationInfo">Showing 0-0 of 0</div>
        <nav>
            <ul class="pagination mb-0" id="paginationControls">
                <!-- Buttons injected via JS -->
            </ul>
        </nav>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/my_requests.js') }}"></script>
{% endblock %}
