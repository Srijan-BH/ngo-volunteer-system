<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard — NGO Volunteer System{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_dashboard.css') }}">
    
    {% block styles %}{% endblock %}
</head>
<body class="admin-body">

    <!-- Main Application Wrapper -->
    <div id="app-container">
        
        <!-- Admin Sidebar -->
        {% include 'components/layout/admin_sidebar.html' %}
        
        <!-- Content Wrapper -->
        <div class="main-wrapper">
            
            <!-- Top Navbar (Reusing existing navbar for now) -->
            {% include 'components/layout/navbar.html' %}
            
            <!-- Main Content Area -->
            <main class="p-4 flex-grow-1 bg-tertiary">
                <div class="container-fluid animate-fade-in-up">
                    {% block content %}{% endblock %}
                </div>
            </main>
            
            <!-- Footer -->
            {% include 'components/layout/footer.html' %}
            
        </div>
    </div>

    <!-- Global Toast Container -->
    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    
    {% block modals %}{% endblock %}
    
    {% block scripts %}{% endblock %}
</body>
</html>
